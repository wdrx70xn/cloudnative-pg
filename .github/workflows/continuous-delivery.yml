name: continuous-delivery
'on':
  issue_comment:
    type:
    - created
  workflow_dispatch:
    inputs:
      depth:
        description: Depth (push, pull_request, main, schedule)
        required: true
        default: main
      test_level:
        description: Test level (0-4)
        required: false
        default: '1'
      feature_type:
        description: Feature Type (disruptive, performance, upgrade, smoke, basic,
          service-connectivity, self-healing, backup-restore, operator, observability,
          replication, plugin, postgres-configuration, pod-scheduling, cluster-metadata,
          recovery, importing-databases, storage, security, maintenance)
        required: false
      log_level:
        description: Log level for operator (error, warning, info(default), debug,
          trace)
        required: false
        default: info
      build_plugin:
        type: boolean
        required: false
        default: false
        description: Include kubectl-cnpg plugin building
  schedule:
  - cron: 0 1 * * *
env:
  GOLANG_VERSION: 1.19.x
  KUBEBUILDER_VERSION: 2.3.1
  KIND_VERSION: v0.17.0
  CNPG_IMAGE_NAME: ghcr.io/${{ github.repository }}-testing
defaults:
  run:
    shell: bash -Eeuo pipefail -x {0}
jobs:
  smoke_test_release_branches:
    runs-on: ubuntu-latest
    name: smoke test release-* branches when it's a scheduled run
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        branch:
        - release-1.17
        - release-1.18
    steps:
    - name: Invoke workflow with inputs
      uses: benc-uk/workflow-dispatch@v121
      with:
        workflow: continuous-delivery
        ref: ${{ matrix.branch }}
        inputs: '{ "depth": "push", "test_level": "4", "build_plugin": "true", "log_level":
          "debug" }'
  check_commenter:
    if: 'github.event_name == ''issue_comment'' &&

      github.event.issue.pull_request &&

      startsWith(github.event.comment.body, ''/test'')

      '
    name: Retrieve command
    runs-on: ubuntu-latest
    outputs:
      github_ref: ${{ steps.refs.outputs.head_sha }}
      depth: ${{ env.DEPTH }}
      test_level: ${{ env.TEST_LEVEL }}
      feature_type: ${{ env.FEATURE_TYPE }}
      log_level: ${{ env.LOG_LEVEL }}
      build_plugin: ${{ env.BUILD_PLUGIN }}
    steps:
    - name: Check for Command
      id: command
      uses: xt0rted/slash-command-action@v2
      continue-on-error: false
      with:
        command: test
        reaction: 'true'
        reaction-type: eyes
        allow-edits: 'false'
        permission-level: write
    - name: Process arguments
      id: args
      run: "ARGS=\"${{ steps.command.outputs.command-arguments }}\"\n# Set the defaults\n\
        DEPTH=\"main\"\nTEST_LEVEL=\"4\"\nFEATURE_TYPE=\"\"\nBUILD_PLUGIN=\"false\"\
        \nLOG_LEVEL=\"debug\"\n\nfor ARG in $ARGS; do\n  IFS='=' read name value <<<\
        \ $ARG\n  case \"${name}\" in\n    \"depth\"|\"d\")\n    DEPTH=\"${value}\"\
        \n    ;;\n    \"test_level\"|\"level\"|\"tl\")\n    TEST_LEVEL=\"${value}\"\
        \n    ;;\n    \"feature_type\"|\"type\"|\"ft\")\n    FEATURE_TYPE=\"${value}\"\
        \n    ;;\n    \"build_plugin\"|\"plugin\"|\"bp\")\n    BUILD_PLUGIN=\"${value}\"\
        \n    ;;\n    \"log_level\"|\"ll\")\n    LOG_LEVEL=\"${value}\"\n    ;;\n\
        \    *)\n    ;;\n  esac\ndone\n\necho \"DEPTH=${DEPTH}\" >> $GITHUB_ENV\n\
        echo \"TEST_LEVEL=${TEST_LEVEL}\" >> $GITHUB_ENV\necho \"FEATURE_TYPE=${FEATURE_TYPE}\"\
        \ >> $GITHUB_ENV\necho \"BUILD_PLUGIN=${BUILD_PLUGIN}\" >> $GITHUB_ENV\necho\
        \ \"LOG_LEVEL=${LOG_LEVEL}\" >> $GITHUB_ENV\n"
    - name: Resolve Git reference
      uses: xt0rted/pull-request-comment-branch@v1
      id: refs
    - name: Create comment
      uses: peter-evans/create-or-update-comment@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        issue-number: ${{ github.event.issue.number }}
        body: '@${{ github.actor }}, here''s the link to the E2E on CNPG workflow
          run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id
          }}

          '
  test_arguments:
    name: Parse arguments
    if: 'github.event_name == ''workflow_dispatch'' || github.event_name == ''schedule''

      '
    runs-on: ubuntu-latest
    outputs:
      github_ref: ${{ github.ref }}
      depth: ${{ env.DEPTH }}
      test_level: ${{ env.TEST_LEVEL }}
      feature_type: ${{ env.FEATURE_TYPE }}
      build_plugin: ${{ env.BUILD_PLUGIN }}
      log_level: ${{ env.LOG_LEVEL }}
    steps:
    - name: Parse input to env
      run: "# Set the defaults for workflow dispatch\nif [[ ${{ github.event_name\
        \ }} == 'workflow_dispatch' ]]; then\n  DEPTH=${{ github.event.inputs.depth\
        \ }}\n  TEST_LEVEL=${{ github.event.inputs.test_level }}\n  FEATURE_TYPE=\"\
        ${{ github.event.inputs.feature_type }}\"\n  BUILD_PLUGIN=\"${{ github.event.inputs.build_plugin\
        \ }}\"\n  LOG_LEVEL=\"${{ github.event.inputs.log_level }}\"\nfi\n# Set the\
        \ defaults for schedule dispatch\nif [[ ${{ github.event_name }} == 'schedule'\
        \ ]]; then\n  DEPTH=\"schedule\"\n  TEST_LEVEL=\"4\"\n  FEATURE_TYPE=\"\"\n\
        \  BUILD_PLUGIN=\"true\"\n  LOG_LEVEL=\"debug\"\nfi\necho \"DEPTH=${DEPTH}\"\
        \ >> $GITHUB_ENV\necho \"TEST_LEVEL=${TEST_LEVEL}\" >> $GITHUB_ENV\necho \"\
        FEATURE_TYPE=${FEATURE_TYPE}\" >> $GITHUB_ENV\necho \"BUILD_PLUGIN=${BUILD_PLUGIN}\"\
        \ >> $GITHUB_ENV\necho \"LOG_LEVEL=${LOG_LEVEL}\" >> $GITHUB_ENV\n"
  evaluate_options:
    name: Evaluate workflow options
    needs:
    - check_commenter
    - test_arguments
    runs-on: ubuntu-latest
    if: "(\n  needs.check_commenter.result == 'success' ||\n  needs.test_arguments.result\
      \ == 'success'\n) &&\n!cancelled()\n"
    outputs:
      git_ref: ${{ env.GITHUB_REF }}
      depth: ${{ env.DEPTH }}
      test_level: ${{ env.TEST_LEVEL }}
      feature_type: ${{ env.FEATURE_TYPE }}
      build_plugin: ${{ env.BUILD_PLUGIN }}
      log_level: ${{ env.LOG_LEVEL }}
    steps:
    - name: From command
      run: "if [[ ${{ github.event_name }} == 'workflow_dispatch' ]] || [[ ${{ github.event_name\
        \ }} == 'schedule' ]]; then\n  echo 'GITHUB_REF=${{ needs.test_arguments.outputs.github_ref\
        \ }}' >> $GITHUB_ENV\n  echo 'DEPTH=${{ needs.test_arguments.outputs.depth\
        \ }}' >> $GITHUB_ENV\n  echo 'TEST_LEVEL=${{ needs.test_arguments.outputs.test_level\
        \ }}' >> $GITHUB_ENV\n  echo 'FEATURE_TYPE=${{ needs.test_arguments.outputs.feature_type\
        \ }}' >> $GITHUB_ENV\n  echo 'BUILD_PLUGIN=${{ needs.test_arguments.outputs.build_plugin\
        \ }}' >> $GITHUB_ENV\n  echo 'LOG_LEVEL=${{ needs.test_arguments.outputs.log_level\
        \ }}' >> $GITHUB_ENV\nfi\nif [[ ${{ github.event_name }} == 'issue_comment'\
        \ ]]; then\n  echo 'GITHUB_REF=${{ needs.check_commenter.outputs.github_ref\
        \ }}' >> $GITHUB_ENV\n  echo 'DEPTH=${{ needs.check_commenter.outputs.depth\
        \ }}' >> $GITHUB_ENV\n  echo 'TEST_LEVEL=${{ needs.check_commenter.outputs.test_level\
        \ }}' >> $GITHUB_ENV\n  echo 'FEATURE_TYPE=${{ needs.check_commenter.outputs.feature_type\
        \ }}' >> $GITHUB_ENV\n  echo 'BUILD_PLUGIN=${{ needs.check_commenter.outputs.build_plugin\
        \ }}' >> $GITHUB_ENV\n  echo 'LOG_LEVEL=${{ needs.check_commenter.outputs.log_level\
        \ }}' >> $GITHUB_ENV\nfi\n"
  buildx:
    name: Build containers
    needs:
    - check_commenter
    - test_arguments
    - evaluate_options
    if: 'always() && !cancelled() &&

      needs.evaluate_options.result == ''success''

      '
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image-meta.outputs.image }}
      branch_name: ${{ steps.build-meta.outputs.branch_name }}
      upload_artifacts: ${{ steps.build-meta.outputs.upload_artifacts }}
      commit_msg: ${{ steps.build-meta.outputs.commit_msg }}
      commit_sha: ${{ steps.build-meta.outputs.commit_sha }}
      author_name: ${{ steps.build-meta.outputs.author_name }}
      author_email: ${{ steps.build-meta.outputs.author_email }}
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        ref: ${{ needs.evaluate_options.outputs.git_ref }}
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: '~/go/pkg/mod

          ~/.cache/go-build

          '
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: '${{ runner.os }}-go-

          '
    - name: Build meta
      id: build-meta
      run: "images='${{ env.CNPG_IMAGE_NAME }}'\ntags=''\nlabels=''\ncommit_sha=${{\
        \ needs.evaluate_options.outputs.git_ref }}\ncommit_date=$(git log -1 --pretty=format:'%ad'\
        \ --date short \"${commit_sha}\" || : )\n# use git describe to get the nearest\
        \ tag and use that to build the version (e.g. 1.4.0+dev24 or 1.4.0)\ncommit_version=$(git\
        \ describe --tags --match 'v*' \"${commit_sha}\"| sed -e 's/^v//; s/-g[0-9a-f]\\\
        +$//; s/-\\([0-9]\\+\\)$/+dev\\1/')\n\n# shortened commit sha\ncommit_short=$(git\
        \ rev-parse --short \"${commit_sha}\")\n\n# multiline strings are weird\n\
        commit_message=$(git show -s --format=%B \"${commit_sha}\")\ncommit_message=${commit_message//$'%'/'%25'}\n\
        commit_message=${commit_message//$'\\n'/'%0A'}\ncommit_message=${commit_message//$'\\\
        r'/'%0D'}\n\n# get git user and email\nauthor_name=$(git show -s --format='%an'\
        \ \"${commit_sha}\")\nauthor_email=$(git show -s --format='%ae' \"${commit_sha}\"\
        )\n\n# extract branch name\nif [ ${{ github.event_name }} != 'pull_request'\
        \ ] && [ ${{ github.event_name }} != 'pull_request_target' ]\nthen\n  branch_name=${GITHUB_REF#refs/heads/}\n\
        else\n  branch_name=${GITHUB_HEAD_REF}\nfi\n\nupload_artifacts=false\nif [[\
        \ ${branch_name} == main || ${branch_name} =~ ^release- ]]; then\n  upload_artifacts=true\n\
        fi\n\necho \"IMAGES=${images}\" >> $GITHUB_ENV\necho \"TAGS=${tags}\" >> $GITHUB_ENV\n\
        echo \"LABELS=${labels}\" >> $GITHUB_ENV\necho \"DATE=${commit_date}\" >>\
        \ $GITHUB_ENV\necho \"VERSION=${commit_version}\" >> $GITHUB_ENV\necho \"\
        COMMIT=${commit_short}\" >> $GITHUB_ENV\necho \"commit_sha=${commit_sha}\"\
        \ >> $GITHUB_OUTPUT\necho \"commit_msg=${commit_message}\" >> $GITHUB_OUTPUT\n\
        echo \"author_name=${author_name}\" >> $GITHUB_OUTPUT\necho \"author_email=${author_email}\"\
        \ >> $GITHUB_OUTPUT\necho \"branch_name=${branch_name}\" >> $GITHUB_OUTPUT\n\
        echo \"upload_artifacts=${upload_artifacts}\" >> $GITHUB_OUTPUT\n"
    - name: Set GoReleaser environment
      run: 'echo GOPATH=$(go env GOPATH) >> $GITHUB_ENV

        echo PWD=$(pwd) >> $GITHUB_ENV

        '
    - name: Run GoReleaser to build kubectl-cnpg plugin
      uses: goreleaser/goreleaser-action@v4
      if: 'github.event_name == ''schedule'' || needs.evaluate_options.outputs.build_plugin
        == ''true''

        '
      with:
        distribution: goreleaser
        version: latest
        args: build --skip-validate --rm-dist --id kubectl-cnpg
      env:
        DATE: ${{ env.DATE }}
        COMMIT: ${{ env.COMMIT }}
        VERSION: ${{ env.VERSION }}
    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2
      if: 'failure() && github.event_name == ''schedule'' &&

        github.organization == ''cloudnative-pg''

        '
      env:
        SLACK_COLOR: ${{ job.status }}
        SLACK_ICON: https://avatars.githubusercontent.com/u/85171364?size=48
        SLACK_USERNAME: cnpg-bot
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_MESSAGE: Building plugin `kubectl-cnpg` failed!
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v4
      with:
        distribution: goreleaser
        version: latest
        args: build --skip-validate --rm-dist --id manager
      env:
        DATE: ${{ env.DATE }}
        COMMIT: ${{ env.COMMIT }}
        VERSION: ${{ env.VERSION }}
    - name: Docker meta
      id: docker-meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.IMAGES }}
        tags: 'type=ref,event=branch

          type=ref,event=pr

          '
    - name: Detect platforms
      run: '# Keep in mind that adding more platforms (architectures) will increase
        the building

        # time even if we use the ghcache for the building process.

        platforms="linux/amd64,linux/arm64"

        echo "PLATFORMS=${platforms}" >> $GITHUB_ENV

        '
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        image: tonistiigi/binfmt:qemu-v6.2.0
        platforms: ${{ env.PLATFORMS }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver-opts: 'image=moby/buildkit:v0.10.6

          '
    - name: Login to ghcr.io
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        platforms: ${{ env.PLATFORMS }}
        context: .
        push: true
        build-args: 'VERSION=${{ env.VERSION }}

          '
        tags: ${{ steps.docker-meta.outputs.tags }}
        labels: ${{ env.LABELS }}
        secrets: GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
    - name: Image Meta
      id: image-meta
      env:
        TAGS: ${{ steps.docker-meta.outputs.tags }}
      run: '# If there is more than one tag, take the first one

        # TAGS could be separated by newlines or commas

        image=$(sed -n ''1{s/,.*//; p}'' <<< "$TAGS")

        echo "image=${image}" >> $GITHUB_OUTPUT

        '
    - name: Generate manifest for operator deployment
      id: generate-manifest
      env:
        CONTROLLER_IMG: ${{ steps.image-meta.outputs.image }}
      run: 'make generate-manifest

        '
    - name: Upload the operator manifest as artifact in workflow
      uses: actions/upload-artifact@v3
      with:
        name: operator-manifest.yaml
        path: dist/operator-manifest.yaml
        retention-days: 7
  publish-artifacts:
    name: Publish artifacts
    needs:
    - buildx
    if: '(always() && !cancelled()) &&

      needs.buildx.result == ''success'' &&

      needs.buildx.outputs.upload_artifacts == ''true'' &&

      github.organization == ''cloudnative-pg''

      '
    runs-on: ubuntu-latest
    steps:
    - name: Checkout artifact
      uses: actions/checkout@v3
      with:
        repository: cloudnative-pg/artifacts
        token: ${{ secrets.REPO_GHA_PAT }}
        ref: main
        fetch-depth: 0
    - name: Configure git user
      run: 'git config user.email "${{ needs.buildx.outputs.author_email }}"

        git config user.name "${{ needs.buildx.outputs.author_name }}"

        '
    - name: Switch to or create the right branch
      env:
        BRANCH: ${{ needs.buildx.outputs.branch_name }}
      run: 'git checkout "${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}"


        # Remove the previous operator manifest if present because the next

        # step doesn''t overwrite existing files

        rm -fr manifests/operator-manifest.yaml

        '
    - name: Prepare the operator manifest
      uses: actions/download-artifact@v3
      with:
        name: operator-manifest.yaml
        path: manifests
    - name: Prepare the commit
      env:
        COMMIT_MESSAGE: '${{ needs.buildx.outputs.commit_msg }}


          https://github.com/cloudnative-pg/cloudnative-pg/commit/${{ needs.buildx.outputs.commit_sha
          }}

          '
      run: '# Skip creating the commit if there are no changes

        [ -n "$(git status -s)" ] || exit 0


        git add .

        git commit -m "${COMMIT_MESSAGE}"

        '
    - name: Push changes
      uses: ad-m/github-push-action@v0.6.0
      with:
        github_token: ${{ secrets.REPO_GHA_PAT }}
        repository: cloudnative-pg/artifacts
        branch: ${{ needs.buildx.outputs.branch_name }}
  generate-jobs:
    name: Generate jobs for E2E tests
    needs:
    - buildx
    - evaluate_options
    if: '(always() && !cancelled()) &&

      needs.buildx.result == ''success''

      '
    runs-on: ubuntu-latest
    outputs:
      image: ${{ needs.buildx.outputs.image }}
      localMatrix: ${{ steps.generate-jobs.outputs.localMatrix }}
      localEnabled: ${{ steps.generate-jobs.outputs.localEnabled }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ needs.evaluate_options.outputs.git_ref }}
    - id: generate-jobs
      name: Generate Jobs
      shell: bash
      run: "python .github/e2e-matrix-generator.py \\\n  -m '${{ needs.evaluate_options.outputs.depth\
        \ }}'\n"
  e2e-local:
    name: Run E2E on local executors
    if: '(always() && !cancelled()) &&

      needs.generate-jobs.outputs.localEnabled == ''true'' &&

      needs.generate-jobs.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.localMatrix) }}
    runs-on: ubuntu-latest
    env:
      TEST_DEPTH: ${{ needs.evaluate_options.outputs.test_level }}
      FEATURE_TYPE: ${{ needs.evaluate_options.outputs.feature_type }}
      K8S_VERSION: ${{ matrix.k8s_version }}
      POSTGRES_VERSION: ${{ matrix.postgres_version }}
      MATRIX: ${{ matrix.id }}
      POSTGRES_IMG: ${{ matrix.postgres_img }}
      E2E_PRE_ROLLING_UPDATE_IMG: ${{ matrix.postgres_pre_img }}
      BRANCH_NAME: ${{ needs.buildx.outputs.branch_name }}
      DOCKER_SERVER: ghcr.io
      DOCKER_USERNAME: ${{ github.actor }}
      DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      DEBUG: 'true'
      BUILD_IMAGE: 'false'
      CONTROLLER_IMG: ${{ needs.generate-jobs.outputs.image }}
      E2E_DEFAULT_STORAGE_CLASS: standard
      LOG_DIR: ${{ github.workspace }}/kind-logs/
      DOCKER_REGISTRY_MIRROR: https://mirror.gcr.io
    steps:
    - name: Cleanup Disk
      uses: jlumbroso/free-disk-space@main
      with:
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        swap-storage: true
    - name: Cleanup docker cache
      run: 'echo "-------------Disk info before cleanup----------------"

        df -h

        echo "-----------------------------------------------------"

        docker system prune -a -f

        echo "-------------Disk info after cleanup----------------"

        df -h

        echo "-----------------------------------------------------"

        '
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ needs.evaluate_options.outputs.git_ref }}
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: '~/go/pkg/mod

          ~/.cache/go-build

          '
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: '${{ runner.os }}-go-

          '
    - name: Prepare the environment
      uses: nick-fields/retry@v2
      with:
        timeout_seconds: 120
        max_attempts: 3
        on_retry_command: '# Clear-ups before retries

          rm -rf /usr/local/bin/kind /usr/local/bin/kubectl

          '
        command: 'sudo apt-get update

          sudo apt-get install -y gettext-base

          sudo hack/setup-cluster.sh prepare /usr/local/bin

          '
    - name: Prepare patch for customization
      env:
        LEADER_ELECTION: 'true'
        LEADER_LEASE_DURATION: 15
        LEADER_RENEW_DEADLINE: 10
        LIVENESS_PROBE_THRESHOLD: 3
        LOG_LEVEL: ${{ needs.evaluate_options.outputs.log_level }}
      run: 'LOG_LEVEL=${LOG_LEVEL:-info}

        envsubst < hack/e2e/env_override_customized.yaml.template > config/manager/env_override.yaml

        cat config/manager/env_override.yaml

        '
    - name: Run Kind End-to-End tests
      run: make e2e-test-kind
    - name: Report failed E2E tests
      if: failure()
      run: 'set +x

        chmod +x .github/report-failed-test.sh

        ./.github/report-failed-test.sh

        '
    - name: Create individual artifact for each E2E test
      if: (always() && !cancelled())
      run: "set +x\necho '{\"runner\": \"local\", \"postgres\": \"${{env.POSTGRES_VERSION}}\"\
        , \"kubernetes\": \"${{env.K8S_VERSION}}\", \"runid\": ${{ github.run_id }},\
        \ \"id\": \"${{ env.MATRIX }}\", \"repo\": \"${{github.repository}}\", \"\
        branch\": \"${{github.head_ref}}\", \"refname\": \"${{github.ref_name}}\"\
        \ }'\npython .github/generate-test-artifacts.py \\\n  -o testartifacts-${{\
        \ env.MATRIX }} \\\n  -f tests/e2e/out/report.json \\\n  -m '{\"runner\":\
        \ \"local\", \"postgres\": \"${{env.POSTGRES_VERSION}}\", \"kubernetes\":\
        \ \"${{env.K8S_VERSION}}\", \"runid\": ${{ github.run_id }}, \"id\": \"${{\
        \ env.MATRIX }}\", \"repo\": \"${{github.repository}}\", \"branch\": \"${{github.head_ref}}\"\
        , \"refname\": \"${{github.ref_name}}\" }'\nif [ -f tests/e2e/out/upgrade_report.json\
        \ ]; then\n  python .github/generate-test-artifacts.py \\\n    -o testartifacts-${{\
        \ env.MATRIX }} \\\n    -f tests/e2e/out/upgrade_report.json \\\n    -m '{\"\
        runner\": \"local\", \"postgres\": \"${{env.POSTGRES_VERSION}}\", \"kubernetes\"\
        : \"${{env.K8S_VERSION}}\", \"runid\": ${{ github.run_id }}, \"id\": \"${{\
        \ env.MATRIX }}\", \"repo\": \"${{github.repository}}\", \"branch\": \"${{github.head_ref}}\"\
        , \"refname\": \"${{github.ref_name}}\" }'\nfi\n"
    - name: Archive test artifacts
      if: (always() && !cancelled())
      uses: actions/upload-artifact@v3
      with:
        name: testartifacts-local
        path: testartifacts-${{ env.MATRIX }}/
        retention-days: 7
    - name: Cleanup test artifacts
      if: always()
      run: rm -rf testartifacts-${{ env.MATRIX }}/
    - name: Cleanup ginkgo JSON report
      if: always()
      run: "if [ -f tests/e2e/out/upgrade_report.json ]; then\n  rm tests/e2e/out/upgrade_report.json\n\
        fi\nif [ -f tests/e2e/out/report.json ]; then\n  rm tests/e2e/out/report.json\n\
        fi\n"
    - name: Archive Kind logs
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: kind-logs-${{ matrix.id }}
        path: kind-logs/
        retention-days: 7
    - name: Archive e2e failure contexts
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: test-failure-contexts-${{ matrix.id }}
        path: 'tests/*/out/

          '
        retention-days: 7
        if-no-files-found: ignore
  summarize-e2e-tests:
    name: E2E test suite
    needs:
    - e2e-local
    if: "always() && !cancelled() &&\n(\n  needs.e2e-local.result == 'success' ||\n\
      \  needs.e2e-local.result == 'failure'\n)\n"
    runs-on: ubuntu-latest
    steps:
    - name: Create a directory for the artifacts
      run: mkdir test-artifacts
    - name: Download all artifacts to the directory
      uses: actions/download-artifact@v3
      with:
        path: test-artifacts
    - name: Flatten all artifacts onto directory
      run: 'mkdir test-artifacts/data

        mv test-artifacts/*/*.json test-artifacts/data

        '
    - name: Display the structure of the artifact folder
      run: ls -R test-artifacts/data
    - name: Compute the E2E test summary
      uses: cloudnative-pg/ciclops@main
      with:
        artifact_directory: test-artifacts/data
        output_file: test-summary.md
    - name: Create GitHub Job Summary from the file
      run: cat test-summary.md >> $GITHUB_STEP_SUMMARY
    - name: Delete the downloaded files
      run: rm -rf test-artifacts
  ok-to-merge:
    name: Label the PR as "ok to merge :ok_hand:"
    needs:
    - evaluate_options
    - e2e-local
    if: "always() && \nneeds.e2e-local.result == 'success' && \ngithub.event_name\
      \ == 'issue_comment' && \nneeds.evaluate_options.outputs.test_level == '4'\n"
    runs-on: ubuntu-latest
    steps:
    - name: Check preconditions
      id: get_pr_number_and_labels
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: 'ok_label=$(gh pr view --json labels -q ".labels.[].name" 2>/dev/null |
        grep "ok to merge :ok_hand:" || :)

        echo "OK_LABEL=${ok_label}" >> $GITHUB_ENV

        '
    - name: Label the PR as "ok to merge :ok_hand:"
      if: 'env.OK_LABEL == ''''

        '
      uses: actions-ecosystem/action-add-labels@v1.1.3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        number: ${{ github.event.issue.number }}
        labels: 'ok to merge :ok_hand:'
  unlabel-ok-to-merge:
    name: Remove the "ok to merge :ok_hand:" label from the PR
    needs:
    - evaluate_options
    - e2e-local
    if: "always() && \nneeds.e2e-local.result == 'failure' && \ngithub.event_name\
      \ == 'issue_comment'\n"
    runs-on: ubuntu-latest
    steps:
    - name: Check preconditions
      id: get_pr_number_and_labels
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: 'ok_label=$(gh pr view --json labels -q ".labels.[].name" 2>/dev/null |
        grep "ok to merge :ok_hand:" || :)

        echo "OK_LABEL=${ok_label}" >> $GITHUB_ENV

        '
    - name: Remove "ok to merge :ok_hand:" label from PR
      if: 'env.OK_LABEL != ''''

        '
      uses: actions-ecosystem/action-remove-labels@v1.3.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        number: ${{ github.event.issue.number }}
        labels: 'ok to merge :ok_hand:'
