name: release-tag
'on':
  pull_request:
    types:
    - closed
    branches:
    - release-*
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Create tag
      if: github.event.pull_request.merged == true && startsWith(github.head_ref,
        'release/v')
      uses: christophebedard/tag-version-commit@v1.6.3
      with:
        token: ${{ secrets.REPO_GHA_PAT }}
        version_regex: ^Version tag to ([0-9]+\.[0-9]+\.[0-9]+)
        version_tag_prefix: v
        dry_run: false
