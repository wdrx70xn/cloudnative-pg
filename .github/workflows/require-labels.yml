name: require-labels
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
    - unlabeled
jobs:
  require-labels:
    name: Require labels
    runs-on: ubuntu-latest
    steps:
    - name: Require labels
      uses: docker://agilepathway/pull-request-label-checker:v1.2.7
      with:
        any_of: 'ok to merge :ok_hand:'
        none_of: do not merge
        repo_token: ${{ secrets.GITHUB_TOKEN }}
