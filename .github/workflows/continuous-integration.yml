name: continuous-integration
'on':
  push:
    branches:
    - main
    - release-*
  pull_request: null
  workflow_dispatch: null
  schedule:
  - cron: 0 1 * * *
env:
  GOLANG_VERSION: 1.19.x
  GOLANGCI_LINT_VERSION: v1.50
  KUBEBUILDER_VERSION: 2.3.1
defaults:
  run:
    shell: bash -Eeuo pipefail -x {0}
jobs:
  smoke_test_release_branches:
    runs-on: ubuntu-latest
    name: smoke test release-* branches when it's a scheduled run
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        branch:
        - release-1.17
        - release-1.18
    steps:
    - name: Invoke workflow with inputs
      uses: benc-uk/workflow-dispatch@v121
      with:
        workflow: continuous-integration
        ref: ${{ matrix.branch }}
  duplicate_runs:
    runs-on: ubuntu-latest
    name: Skip duplicate runs
    continue-on-error: true
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip == 'true' && github.ref
        != 'refs/heads/main' }}
    steps:
    - id: skip_check
      uses: fkirc/skip-duplicate-actions@v5.3.0
      with:
        concurrent_skipping: same_content
        skip_after_successful_duplicate: 'true'
        paths_ignore: '["README.md", "docs/**"]'
        do_not_skip: '["pull_request", "workflow_dispatch", "schedule"]'
  change-triage:
    name: Check changed files
    needs: duplicate_runs
    if: ${{ needs.duplicate_runs.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      docs-changed: ${{ steps.filter.outputs.docs-changed }}
      operator-changed: ${{ steps.filter.outputs.operator-changed }}
      test-changed: ${{ steps.filter.outputs.test-changed }}
      shell-script-changed: ${{ steps.filter.outputs.shell-script-changed }}
      go-code-changed: ${{ steps.filter.outputs.go-code-changed }}
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Check for changes
      uses: dorny/paths-filter@v2.11.1
      id: filter
      with:
        base: ${{ (github.event_name == 'schedule') && 'main' || '' }}
        filters: "docs-changed:\n  - '**/*.md'\n  - 'docs/**'\n  - '.wordlist-en-custom.txt'\n\
          operator-changed:\n  - 'api/**'\n  - 'cmd/**'\n  - 'config/**'\n  - 'controllers/**'\n\
          \  - 'internal/**'\n  - 'licenses/**'\n  - 'pkg/**'\n  - '.github/workflows/continuous-delivery.yml'\n\
          \  - '.github/workflows/continuous-integration.yml'\n  - '.goreleaser.yml'\n\
          \  - 'Dockerfile'\n  - 'Makefile'\n  - 'go.mod'\n  - 'go.sum'\ntest-changed:\n\
          \  - 'tests/**'\n  - 'hack/**'\nshell-script-changed:\n  - '**/*.sh'\ngo-code-changed:\n\
          \  - '**/*.go'\n  - '.golangci.yml'\n"
  go-linters:
    name: Run linters
    needs:
    - duplicate_runs
    - change-triage
    if: 'needs.duplicate_runs.outputs.should_skip != ''true'' &&

      needs.change-triage.outputs.go-code-changed == ''true''

      '
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Check go mod
      run: 'make go-mod-check

        '
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: ${{ env.GOLANGCI_LINT_VERSION }}
        args: --timeout 4m
  shellcheck:
    name: Run shellcheck linter
    needs:
    - duplicate_runs
    - change-triage
    if: 'needs.duplicate_runs.outputs.should_skip != ''true'' &&

      needs.change-triage.outputs.shell-script-changed == ''true''

      '
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_OPTS: -a -S style
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@2.0.0
  generate-unit-tests-jobs:
    name: Generate jobs for unit tests
    needs:
    - duplicate_runs
    - change-triage
    if: "needs.duplicate_runs.outputs.should_skip != 'true' &&\n(\n  needs.change-triage.outputs.operator-changed\
      \ == 'true' ||\n  needs.change-triage.outputs.go-code-changed == 'true'\n)\n"
    runs-on: ubuntu-latest
    outputs:
      k8sMatrix: ${{ steps.get-k8s-versions.outputs.k8s_versions }}
      latest_k8s_version: ${{ steps.get-k8s-versions.outputs.latest_k8s_version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Get k8s versions for unit test
      id: get-k8s-versions
      shell: bash
      run: "k8s_versions=$(jq -c '\n  .unit_test.max as $max |\n  .unit_test.min as\
        \ $min |\n  $min | [ while(. <= $max;\n      . | split(\".\") | .[1] |= (.|tonumber|.+1|tostring)\
        \ | join(\".\")\n    )\n  ] |\n  .[] |= .+\".x\"\n' < .github/k8s_versions_scope.json)\n\
        echo \"k8s_versions=${k8s_versions}\" >> $GITHUB_OUTPUT\n\nlatest_k8s_version=$(jq\
        \ -r '.|last' <<< $k8s_versions)\necho \"latest_k8s_version=${latest_k8s_version}\"\
        \ >> $GITHUB_OUTPUT\n"
  tests:
    name: Run unit tests
    needs:
    - duplicate_runs
    - change-triage
    - generate-unit-tests-jobs
    if: "needs.duplicate_runs.outputs.should_skip != 'true' &&\n(\n  needs.change-triage.outputs.operator-changed\
      \ == 'true' ||\n  needs.change-triage.outputs.go-code-changed == 'true'\n)\n"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s-version: ${{ fromJSON(needs.generate-unit-tests-jobs.outputs.k8sMatrix)
          }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: '~/go/pkg/mod

          ~/.cache/go-build

          '
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: '${{ runner.os }}-go-

          '
    - name: Run unit tests
      env:
        ENVTEST_K8S_VERSION: ${{ matrix.k8s-version }}
      run: 'make test

        '
    - name: Coverage Summary
      if: matrix.k8s-version == needs.generate-unit-tests-jobs.outputs.latest_k8s_version
      run: 'go tool cover -func=cover.out -o coverage.out

        '
    - name: Publish unit test summary on the latest k8s version
      if: matrix.k8s-version == needs.generate-unit-tests-jobs.outputs.latest_k8s_version
      run: 'echo "Unit test coverage: $(tail -n 1 coverage.out | awk ''{print $3}'')"
        >> $GITHUB_STEP_SUMMARY

        '
  apidoc:
    name: Verify API doc is up to date
    needs:
    - duplicate_runs
    - change-triage
    if: "needs.duplicate_runs.outputs.should_skip != 'true' &&\n(\n  needs.change-triage.outputs.go-code-changed\
      \ == 'true' ||\n  needs.change-triage.outputs.docs-changed == 'true'\n)\n"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Run make apidoc
      run: 'make apidoc

        '
    - name: Verify apidoc changes
      run: "apidoc_file_path='docs/src/api_reference.md'\nif git status --porcelain\
        \ $apidoc_file_path | grep '^ M'; then\n  echo \"The API documentation doesn't\
        \ reflect the current API. Please run make apidoc.\"\n  exit 1\nfi\n"
  crd:
    name: Verify CRD is up to date
    needs:
    - duplicate_runs
    - change-triage
    if: 'needs.duplicate_runs.outputs.should_skip != ''true'' &&

      needs.change-triage.outputs.go-code-changed == ''true''

      '
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Run make manifests
      run: 'make manifests

        '
    - name: Check CRD manifests are up to date
      run: "crd_path='config/crd'\nif git status --porcelain $crd_path | grep '^ M';\
        \ then\n  echo \"The CRD manifests do not reflect the current API. Please\
        \ run make manifests.\"\n  exit 1\nfi\n"
  buildx:
    name: Build containers
    needs:
    - go-linters
    - shellcheck
    - tests
    - apidoc
    - crd
    - duplicate_runs
    - change-triage
    if: "(always() && !cancelled()) &&\n(\n  needs.duplicate_runs.outputs.should_skip\
      \ != 'true' &&\n  (\n    needs.change-triage.outputs.operator-changed == 'true'\
      \ ||\n    needs.change-triage.outputs.test-changed == 'true' ||\n    needs.change-triage.outputs.shell-script-changed\
      \ == 'true' ||\n    needs.change-triage.outputs.go-code-changed == 'true'\n\
      \  )\n) &&\n(needs.go-linters.result == 'success' || needs.go-linters.result\
      \ == 'skipped') &&\n(needs.shellcheck.result == 'success' || needs.shellcheck.result\
      \ == 'skipped') &&\n(needs.tests.result == 'success' || needs.tests.result ==\
      \ 'skipped') &&\n(needs.apidoc.result == 'success' || needs.apidoc.result ==\
      \ 'skipped') &&\n(needs.crd.result == 'success' || needs.crd.result == 'skipped')\n"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: '~/go/pkg/mod

          ~/.cache/go-build

          '
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: '${{ runner.os }}-go-

          '
    - name: Build meta
      run: 'commit_sha=${{ github.event.pull_request.head.sha || github.sha }}

        commit_date=$(git log -1 --pretty=format:''%ad'' --date short "${commit_sha}"
        || : )


        # use git describe to get the nearest tag and use that to build the version
        (e.g. 1.4.0+dev24 or 1.4.0)

        commit_version=$(git describe --tags --match ''v*'' "${commit_sha}"| sed -e
        ''s/^v//; s/-g[0-9a-f]\+$//; s/-\([0-9]\+\)$/+dev\1/'')


        # shortened commit sha

        commit_short=$(git rev-parse --short "${commit_sha}")


        echo "DATE=${commit_date}" >> $GITHUB_ENV

        echo "VERSION=${commit_version}" >> $GITHUB_ENV

        echo "COMMIT=${commit_short}" >> $GITHUB_ENV

        '
    - name: Set GoReleaser environment
      run: 'echo GOPATH=$(go env GOPATH) >> $GITHUB_ENV

        echo PWD=$(pwd) >> $GITHUB_ENV

        '
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v4
      with:
        distribution: goreleaser
        version: latest
        args: build --skip-validate --rm-dist --id manager
      env:
        DATE: ${{ env.DATE }}
        COMMIT: ${{ env.COMMIT }}
        VERSION: ${{ env.VERSION }}
    - name: Docker meta
      id: docker-meta
      uses: docker/metadata-action@v4
      with:
        images: cloudnative-pg/cloudnative-pg
        tags: 'type=ref,event=branch

          type=ref,event=pr

          '
    - name: Detect platforms
      run: '# Keep in mind that adding more platforms (architectures) will increase
        the building

        # time even if we use the ghcache for the building process.

        platforms="linux/amd64,linux/arm64"

        echo "PLATFORMS=${platforms}" >> $GITHUB_ENV

        '
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        image: tonistiigi/binfmt:qemu-v6.2.0
        platforms: ${{ env.PLATFORMS }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver-opts: 'image=moby/buildkit:v0.10.6

          '
    - name: Build and load
      uses: docker/build-push-action@v4
      with:
        platforms: ${{ env.PLATFORMS }}
        context: .
        push: false
        build-args: 'VERSION=${{ env.VERSION }}

          '
        tags: ${{ steps.docker-meta.outputs.tags }}
